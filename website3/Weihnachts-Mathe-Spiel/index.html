<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Weihnachts-Mathe-Spiel</title>
    <link rel="stylesheet" href="style.css" />
    <script defer src="script.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>Weihnachts-Mathe-Spiel</h1>
      <div class="top-info">
        <div class="panel">Aufgabe: <strong id="question">—</strong></div>
        <div class="panel">Punkte: <strong id="score">0</strong></div>
        <div class="panel">Zeit: <strong id="time">60</strong>s</div>
        <div class="controls">
          <button id="startBtn">Start</button>
          <button id="modeBtn">Modus: +</button>
        </div>
      </div>
    </header>

    <div class="game-area" id="game">
      <div class="snow" id="snow"></div>
      <div class="ground"></div>
    </div>

    <section style="margin-top: 20px;color:#ddd;font-size:1.2rem">
      <h4>Wie funktioniert's?</h4>
      <p style="margin-top: -20px;">Klicke das Geschenk mit der richtigen Lösung zur Frage. Je schneller und genauer, desto mehr Punkte. Du kannst Aufgabentypen (Addition, Subtraktion, Multiplikation, Division) einstellen und Schwierigkeitsgrade ändern.</p>
    </section>
  </div>


</body>
</html>
